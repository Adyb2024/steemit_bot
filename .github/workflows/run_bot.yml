name: Steemit Auto Bot (WhaleMind v3.6)

on:
  schedule:
    # تم التحديث للنشر كل 4 ساعات (00:00, 04:00, 08:00, 12:00, 16:00, 20:00)
    - cron: '0 */4 * * *'
  workflow_dispatch:      # زر للتشغيل اليدوي من واجهة GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install beem google-generativeai requests python-dotenv

      - name: Run Bot
        env:
          POSTING_KEY: ${{ secrets.POSTING_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          STEEM_USER: "whalemind" 
        run: python steemit_bot.py

name: Steemit Global Bot (6H Cycle)

on:
  schedule:
    # النشر كل 6 ساعات (تغطية عالمية متوازنة مع الحفاظ على الـ RC)
    - cron: '0 */6 * * *'
  workflow_dispatch:      # للتشغيل اليدوي الفوري

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install beem google-generativeai requests python-dotenv

      - name: Run Bot
        env:
          POSTING_KEY: ${{ secrets.POSTING_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          STEEM_USER: "whalemind" 
        run: python steemit_bot.py
